name: Update World Cup Pool Data

on:
  schedule:
    # Low-frequency safety net (every 3 hours). Most of the freshness comes from
    # the precise match-end triggers below, regenerated daily by schedule-updates.yml.
    - cron: "0 */3 * * *"
    # BEGIN AUTO-GENERATED MATCH TRIGGERS
    - cron: "15 19 1 7 *"
    - cron: "40 19 1 7 *"
    - cron: "15 23 1 7 *"
    - cron: "40 23 1 7 *"
    - cron: "15 3 2 7 *"
    - cron: "40 3 2 7 *"
    # END AUTO-GENERATED MATCH TRIGGERS
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest data and recompute standings
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "world-cup-pool-bot"
          git config user.email "actions@github.com"
          git add data/standings.json data/bracket.json data/history.json data/matches-raw.json
          git diff --quiet --cached || git commit -m "Update standings and bracket data"
          git push
