name: Update World Cup Pool Data

on:
  schedule:
    # Every 60 minutes, all day. Each run uses ~4 API calls (full match list
    # pagination + competition info), so 24 runs/day keeps us at ~96/day,
    # just under the 100/day free-tier limit.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest data and recompute standings
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "world-cup-pool-bot"
          git config user.email "actions@github.com"
          git add data/standings.json data/bracket.json data/history.json
          git diff --quiet --cached || git commit -m "Update standings and bracket data"
          git push
